name: Build and Release

on:
  push:
    branches: ['*']
    tags: ['v*']
  pull_request:
    branches: ['*']

jobs:
  # Build and test job for all pushes/PRs
  build:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Ubuntu 22.04 removed due to C++20 compatibility issues with GCC 11.4.0
        # Ubuntu 24.04 with GCC 13.3.0 provides full C++20 support required by the project
        os: [ubuntu-24.04]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake git pkg-config curl \
            libcurl4-openssl-dev libfmt-dev libmagick++-dev libmariadb-dev libfcgi-dev \
            libxml2-dev libmemcached-dev libarchive-dev libssl-dev \
            libmongoc-dev libbson-dev libsasl2-dev

    # MongoDB does not ship apt packages for the modern mongocxx (3.x/4.x) C++
    # driver, and Ubuntu 24.04 dropped `libmongocxx-dev` from its universe repo.
    # We build mongocxx from the official source release and cache the install
    # tree keyed on the version so we only pay the ~4-minute build on version
    # bumps.
    - name: Cache mongocxx install
      id: cache-mongocxx
      uses: actions/cache@v4
      with:
        path: /opt/mongocxx
        key: mongocxx-r4.3.0-${{ matrix.os }}

    - name: Build mongocxx from source
      if: steps.cache-mongocxx.outputs.cache-hit != 'true'
      run: |
        curl -fsSL -o /tmp/mongocxx.tar.gz \
          https://github.com/mongodb/mongo-cxx-driver/releases/download/r4.3.0/mongo-cxx-driver-r4.3.0.tar.gz
        tar -xzf /tmp/mongocxx.tar.gz -C /tmp
        cmake -S /tmp/mongo-cxx-driver-r4.3.0 -B /tmp/mongocxx-build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=20 \
          -DCMAKE_INSTALL_PREFIX=/opt/mongocxx \
          -DBUILD_SHARED_LIBS=ON \
          -DENABLE_TESTS=OFF \
          -DBUILD_VERSION=4.3.0
        cmake --build /tmp/mongocxx-build --parallel
        cmake --install /tmp/mongocxx-build

    - name: Register mongocxx with pkg-config/ldconfig
      run: |
        echo "PKG_CONFIG_PATH=/opt/mongocxx/lib/pkgconfig" >> $GITHUB_ENV
        echo "/opt/mongocxx/lib" | sudo tee /etc/ld.so.conf.d/mongocxx.conf
        sudo ldconfig

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_CLI=ON \
          -DBUILD_COMPILER=ON \
          -DBUILD_FASTCGI=ON \
          -DBUILD_TESTS=ON
    
    - name: Build project
      run: cmake --build build --parallel
    
    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure --parallel
    
    - name: Create DEB packages (tags only)
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd build
        cpack -G DEB || { echo "DEB creation failed"; exit 1; }
    
    - name: Upload DEB artifacts (tags only)
      if: startsWith(github.ref, 'refs/tags/') && hashFiles('build/*.deb') != ''
      uses: actions/upload-artifact@v4
      with:
        name: voidscript-deb-${{ matrix.os }}-${{ github.sha }}
        path: build/*.deb
        retention-days: 7
        if-no-files-found: error

  # Release job for tagged versions only
  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
    - name: Download DEB artifacts
      uses: actions/download-artifact@v4
      with:
        name: voidscript-deb-ubuntu-24.04-${{ github.sha }}
        path: artifacts/
    
    - name: Get tag name
      id: get_tag
      run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: List available packages
      run: |
        echo "Available DEB packages for release:"
        ls -la artifacts/*.deb || echo "No .deb files found in artifacts"
    
    - name: Create GitHub Release
      if: hashFiles('artifacts/*.deb') != ''
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ steps.get_tag.outputs.tag }}
        tag_name: ${{ steps.get_tag.outputs.tag }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: artifacts/*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}